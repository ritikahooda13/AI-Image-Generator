<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Cyber Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing-dot {
            animation: typingAnimation 1.4s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: .2s; }
        .typing-dot:nth-child(3) { animation-delay: .4s; }
        @keyframes typingAnimation {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-white min-h-screen flex items-center justify-center p-4 font-sans">

    <!-- Glowing Glassmorphism Card -->
    <div class="max-w-md w-full h-[600px] bg-slate-900/80 backdrop-blur-md rounded-2xl shadow-[0_0_30px_rgba(99,102,241,0.2)] border border-indigo-500/30 flex flex-col overflow-hidden">
        
        <!-- Premium Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-violet-600 p-4 flex items-center gap-3 shadow-lg border-b border-indigo-500/20">
            <div class="relative">
                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-xl shadow-inner">🤖</div>
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-400 border-2 border-slate-900 rounded-full"></span>
            </div>
            <div class="text-left">
                <h2 class="font-bold text-base tracking-wide text-white">Nexus AI</h2>
                <p class="text-xs text-indigo-200">Online & Core Ready</p>
            </div>
        </div>

        <!-- Chat Arena -->
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 scroll-smooth">
            <!-- Bot Initial Message -->
            <div class="flex items-start gap-2.5">
                <div class="w-8 h-8 rounded-full bg-indigo-600/30 flex items-center justify-center text-sm border border-indigo-500/30">AI</div>
                <div class="bg-slate-800 text-slate-100 p-3 rounded-2xl rounded-tl-none max-w-[80%] text-sm shadow-md border border-slate-700/50">
                    Greetings! I am Nexus AI. Let's make something amazing happen today. What's on your mind?
                </div>
            </div>
        </div>

        <!-- Dynamic Typing Indicator (Hidden by default) -->
        <div id="typing-indicator" class="hidden px-4 py-2 flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-full bg-indigo-600/30 flex items-center justify-center text-sm border border-indigo-500/30">AI</div>
            <div class="bg-slate-800 p-3 rounded-2xl rounded-tl-none flex items-center gap-1 shadow-md border border-slate-700/50">
                <span class="typing-dot w-2 h-2 bg-indigo-400 rounded-full inline-block"></span>
                <span class="typing-dot w-2 h-2 bg-indigo-400 rounded-full inline-block"></span>
                <span class="typing-dot w-2 h-2 bg-indigo-400 rounded-full inline-block"></span>
            </div>
        </div>

        <!-- Futuristic Input Panel -->
        <div class="p-3 bg-slate-950/60 border-t border-slate-800 flex items-center gap-2">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Message Nexus AI..." 
                class="flex-1 p-3 rounded-xl bg-slate-800/80 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition"
                onkeypress="handleKeyPress(event)"
            >
            <button 
                onclick="sendMessage()" 
                class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white p-3 rounded-xl font-semibold transition shadow-lg shadow-indigo-600/30 text-sm flex items-center justify-center"
            >
                Send 🚀
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. Show User Message
            appendMessage(message, 'user');
            userInput.value = '';

            // 2. Show Typing Indicator
            typingIndicator.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Fetch Data from Server
            fetch('/get', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            })
            .then(res => res.json())
            .then(data => {
                typingIndicator.classList.add('hidden'); // Hide typing
                appendMessage(data.reply, 'bot');
            })
            .catch(() => {
                typingIndicator.classList.add('hidden');
                appendMessage("System offline. Please check connection.", 'bot');
            });
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = sender === 'user' ? 'flex items-start justify-end gap-2.5' : 'flex items-start gap-2.5';

            const bubble = document.createElement('div');
            bubble.innerText = text;
            
            if (sender === 'user') {
                bubble.className = 'bg-gradient-to-r from-indigo-600 to-violet-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[80%] text-sm shadow-md';
                
                const avatar = document.createElement('div');
                avatar.className = 'w-8 h-8 rounded-full bg-violet-500/20 flex items-center justify-center text-sm border border-violet-500/30 order-last';
                avatar.innerText = 'ME';
                wrapper.appendChild(avatar);
            } else {
                bubble.className = 'bg-slate-800 text-slate-100 p-3 rounded-2xl rounded-tl-none max-w-[80%] text-sm shadow-md border border-slate-700/50';
                
                const avatar = document.createElement('div');
                avatar.className = 'w-8 h-8 rounded-full bg-indigo-600/30 flex items-center justify-center text-sm border border-indigo-500/30';
                avatar.innerText = 'AI';
                wrapper.insertBefore(avatar, bubble);
            }

            if(sender === 'user') {
                wrapper.insertBefore(bubble, wrapper.firstChild);
            } else {
                wrapper.appendChild(bubble);
            }

            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
